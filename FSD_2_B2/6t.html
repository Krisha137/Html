<!DOCTYPE html>
<html lang="en">

</head>
<body>
    <script>
        var a={"divition1":{"name":["x","p","a","y","n"],"age":[10,20,11,10,12,2]},
                "divition2":{"name":["t","b","f","v","m"],"age":[11,12,10,11,12,7,5]}}
            var d1=a.divition1.name
            var d2=a.divition2.name
            // d=d1+","+d2
            // d=d.split(",")
            // a=d.sort()
            // document.writeln(a)

            var ans=d1.concat(d2).sort()
            console.log(ans) //  ['a', 'b', 'f', 'm', 'n', 'p', 't', 'v', 'x', 'y']
            for(i of ans){
                document.write(`<h2>Student ${i}</h2>`)
            }

            // wrong sorting for age
            var a1=a.divition1.age
            var a2=a.divition2.age
            var ans=a1.concat(a2).sort()
            console.log(ans) // [10, 10, 10, 11, 11, 11, 12, 12, 12, 2, 20, 5, 7]
            for(i of ans){
                document.write(`<h2> Age ${i}</h2>`)
            }

            var ans=a1.concat(a2).sort((a,b)=>b-a)
            console.log(ans) // [20, 12, 12, 12, 11, 11, 11, 10, 10, 10, 7, 5, 2]
            for(i of ans){
                document.write(`<h2> Age ${i}</h2>`)
            }

            var ans=a1.concat(a2).sort((a,b)=>a-b)
            console.log(ans) // [2, 5, 7, 10, 10, 10, 11, 11, 11, 12, 12, 12, 20]
            for(i of ans){
                document.write(`<h2> Age ${i}</h2>`)
            }
    </script>
</body>
</html>
