<!DOCTYPE html>
<html lang="en">
<head>
    
</head>
<body>
    <script>
        const emp=[{"name":"pqr","age":20},{"name":"xyz","age":25},{"name":"mno","age":18}]
        var a=emp.sort((x,y)=>y.age-x.age)
        for(i of a){
            console.log(i.name+" "+i.age) // xyz 25 pqr 20 mno 18
        }
        console.log("Lowest age of this Data : "+a[a.length-1].age) // Lowest age of this Data : 18

        console.log(Math.max(...emp.map(e=>e.age))) // 25
    </script>
</body>
</html>
