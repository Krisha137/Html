    <script>
        var a=["xyz","pqr","mno","jkn","dfg"]

            var o={}
            o[p[0]]=p[p.length-1]

        }
        document.writeln((JSON.stringify(firstlast(a)))) // {"xyz":"dfg"}
    </script>
