<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var x=2,y=4;
        setInterval(()=>{
            document.getElementById("o").innerHTML=`Addition is : ${++x + ++y}`
        },2000)
    </script>
    <h1>Show Calculations</h1>
    <h3 id="o"></h3>
</body>
</html>
